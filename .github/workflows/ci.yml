name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  merge_group:

jobs:
  format:
    name: Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run spotlessCheck
        run: ./gradlew spotlessCheck

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run detekt
        run: ./gradlew detektAll

  # jvmTest and wasmJsTest both run the shared Compose UI tests plus the logic
  # and ViewModel tests; wasmJsTest does so on the production target. jsTest runs
  # the logic/ViewModel tests on the old-browser fallback runtime (js cannot host
  # Compose UI tests). They run as parallel matrix legs (fail-fast disabled) so
  # each target reports independently instead of one masking the other's result.
  test:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [ jvmTest, wasmJsTest, jsTest ]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # The open-source licenses screen reads a generated, gitignored
      # aboutlibraries.json resource. The UI tests that render it run on jvmTest
      # and wasmJsTest, so the resource is exported for both. jsTest runs only the
      # logic/ViewModel tests, which do not touch resources.
      - name: Export Library Definitions
        if: matrix.target != 'jsTest'
        run: ./gradlew :composeApp:exportLibraryDefinitions -PaboutLibraries.exportPath=src/commonMain/composeResources/files/

      - name: Run tests
        run: ./gradlew :composeApp:${{ matrix.target }}

  build:
    name: Build (deploy parity)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Export Library Definitions
        run: ./gradlew :composeApp:exportLibraryDefinitions -PaboutLibraries.exportPath=src/commonMain/composeResources/files/

      - name: Build (wasmJs production distribution)
        run: ./gradlew :composeApp:wasmJsBrowserDistribution
